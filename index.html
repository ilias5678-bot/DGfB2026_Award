<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DGfB 2026 Jury Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --bg: #f0f2f5; 
            --success: #2ecc71; 
            --text: #2c3e50;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); margin: 0; padding: 0; color: var(--text); line-height: 1.4;
        }

        .sticky-top-area {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg);
        }

        .header { 
            background: white; 
            padding: 10px 0; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            text-align: center; 
        }
        
        .logo-container img { width: 100%; max-width: 500px; height: auto; display: block; margin: 0 auto; }

        .header-content { padding: 5px 15px 10px 15px; background: white; }
        input[type="text"] { 
            width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #eee; 
            font-size: 16px; text-align: center; background: #f9f9f9;
        }

        .ranking-legend {
            background: #ffffff; 
            padding: 10px; 
            font-size: 0.75rem; 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            justify-content: space-around;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.1);
        }

        .score-box { padding: 2px 6px; border-radius: 4px; font-weight: bold; color: white; margin-right: 4px; }
        .bg-red { background: #e74c3c; }
        .bg-green { background: #2ecc71; }

        #mainContainer { padding: 15px; }

        .poster-item { 
            background: white; margin-bottom: 10px; border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #ddd;
        }
        .poster-item.active { border-left-color: var(--accent); }
        .poster-item.done { border-left-color: var(--success); background: #fafffb; }

        .poster-header { padding: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 0.85rem; }

        .poster-content { display: none; padding: 10px 14px; border-top: 1px solid #f0f0f0; }
        .poster-item.active .poster-content { display: block; }

        .crit-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f9f9f9;
            gap: 10px;
        }

        .crit-label-area {
            display: flex;
            align-items: center;
            flex: 1;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .info-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 18px;
            font-size: 11px;
            margin-left: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .info-text-bubble {
            display: none;
            background: #ebf5fb;
            color: #2e86c1;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            border: 1px solid #d6eaf8;
        }

        select { 
            padding: 6px; border-radius: 6px; background: #fff; 
            border: 2px solid #ddd; font-size: 1rem; width: 65px; font-weight: bold; 
        }

        .btn-save-local { 
            background: var(--accent); color: white; border: none; padding: 14px; 
            border-radius: 8px; width: 100%; font-weight: 800; margin-top: 10px;
        }

        .btn-cloud { 
            background: var(--success); color: white; border: none; padding: 18px; 
            border-radius: 12px; width: calc(100% - 30px); font-size: 1.1rem; 
            font-weight: 800; margin: 10px 15px 40px 15px; text-transform: uppercase;
        }

        #adminArea { padding: 15px; background: white; margin: 15px; border-radius: 12px; display: none; }
        #adminTable table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        #adminTable th, #adminTable td { border: 1px solid #eee; padding: 8px; text-align: center; }
        #adminTable th { background: #f8f9fa; }
        
        .btn-csv {
            background: #e67e22; color: white; border: none; padding: 10px 15px; 
            border-radius: 6px; font-weight: bold; margin-bottom: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="sticky-top-area">
    <div class="header">
        <div class="logo-container"><img src="https://bio-mechanik.org/wp-content/uploads/2025/08/DGfB-banner-v8-1.png"></div>
    </div>
    
    <div class="header-content">
        <input type="text" id="jurorName" placeholder="Ihr Name (Juroren-Kürzel)">
    </div>

    <div class="ranking-legend">
        <div class="legend-item"><span class="score-box bg-red">1</span> schlecht</div>
        <div class="legend-item">...</div>
        <div class="legend-item"><span class="score-box bg-green">5</span> exzellent</div>
    </div>
</div>

<div id="mainContainer"></div>

<button class="btn-cloud" onclick="finalCloudUpload()">Zentral Speichern</button>

<button onclick="toggleAdmin()" style="width:100%; padding:20px; opacity:0.05; background:none; border:none;">Admin</button>

<div id="adminArea">
    <h3>Ranking Übersicht</h3>
    <button class="btn-csv" onclick="exportToCSV()">Als CSV exportieren</button>
    <div id="adminTable"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMk8sqJiTbOB1LKNZJ4peKEBoyz_2sohM",
        authDomain: "dgfb-2026.firebaseapp.com",
        databaseURL: "https://dgfb-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dgfb-2026",
        storageBucket: "dgfb-2026.firebasestorage.app",
        messagingSenderId: "195774055960",
        appId: "1:195774055960:web:b83f48b55f8ffd5266a56d",
        measurementId: "G-0CS3ZW0ZDV"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let jurorUID = localStorage.getItem('jurorUID') || ("J-" + Math.random().toString(36).substr(2, 5).toUpperCase());
    localStorage.setItem('jurorUID', jurorUID);

    const titles = [
        "109 Biomechanische Testung von Kabelklammerimplantaten (Vorderer Beckenring)",
        "111 Exploring Optimal Body Positioning in MTB Gravity Sports using IMU Data",
        "129 Be Real: Predicting Treadmill Belt Speed Changes in Walking",
        "146 Einfluss mechanischer Belastung auf das Quellverhalten der Bandscheibe",
        "154 Pilotstudie: Plantar- und Kieferprovokationen auf Gangparameter",
        "155 Gait Variations: Neurological Patient Groups vs. Healthy Control",
        "158 Osteosynthesis Screw Failure Prediction (Machine-Learning)",
        "162 Biomechanical Gait Parameters (Transfemoral Amputation - Multicenter)",
        "168 µCT-based Geometry in Biomechanical Testing (Rat Model)",
        "170 Evaluating Human Activity Recognition (Smart Insoles)",
        "172 Lockerungserkennung von Hüftendoprothesen mittels Körperschall",
        "180 Spatial Activation Patterns of Biceps Femoris (Eccentric Knee Flexion)",
        "185 Seitenspezifische Unterschiede Belastbarkeit Pedikelschrauben",
        "188 Einfluss Krafttraining Oberschenkel auf Kniegelenkskinematik",
        "200 Methods to Investigate Vibration Perception Thresholds at the Foot",
        "204 In vivo Belastung und Gewebeanpassung in kaudalen Wirbelkörpern",
        "223 Neuromuskuläre Stimulation & Thermografie der Rückenmuskulatur",
        "224 Adhesion Enhancement of Titanium Nanotubes on Ti6Al4V",
        "226 Biomechanische Analyse der Band- und Sehnenstruktur (Kniegelenk)",
        "227 Development of an Advanced Knee Simulator for Dynamic Motion",
        "229 Single vs. Double Plating in Low Transverse Sacral Fractures",
        "233 Biomechanical Analysis of Porcine Growth Plates (Compression)",
        "238 Überwachung der Knochenheilung (Smart Implant) > 11 Jahre",
        "239 Computational Analysis: Collagen Scaffolds in Bone Defects",
        "241 Experimenteller Aufbau: Prüfung von Sternumfrakturen",
        "251 Muscle Extension Analysis for Soft Wearable Systems Design",
        "259 Triceps Surae Muscle Volume Assessment after Fibula Free Flap",
        "264 Longitudinale Entwicklung Gangparameter nach Sprunggelenksfraktur",
        "270 Electromechanical Computational Model of the Human Stomach"
    ];

    const criteriaData = [
        { name: "Qualität & Innovation", info: "Originalität, methodische Strenge & Neuheitswert." },
        { name: "Struktur & Darstellung", info: "Visuelle Qualität, logischer Aufbau & Klarheit." },
        { name: "Relevanz & Transfer", info: "Bedeutung für Fachwelt, Klinik oder Praxis." }
    ];

    const container = document.getElementById('mainContainer');
    titles.forEach((title, pIdx) => {
        let critHtml = '';
        criteriaData.forEach((c, cIdx) => {
            critHtml += `
            <div id="info-bubble-${pIdx}-${cIdx}" class="info-text-bubble">${c.info}</div>
            <div class="crit-row">
                <div class="crit-label-area">
                    <span>${c.name}</span>
                    <span class="info-icon" onclick="toggleInfoText(${pIdx}, ${cIdx})">i</span>
                </div>
                <select class="score-sel" data-p="${pIdx}" data-c="${cIdx}">
                    <option value="" disabled selected>-</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                </select>
            </div>`;
        });
        const item = document.createElement('div');
        item.className = 'poster-item';
        item.id = `poster-item-${pIdx}`;
        item.innerHTML = `
            <div class="poster-header" onclick="togglePoster(${pIdx})"><span>${title}</span><span class="status-dot"></span></div>
            <div class="poster-content">${critHtml}<button class="btn-save-local" onclick="saveLocal(${pIdx})">Übernehmen</button></div>`;
        container.appendChild(item);
    });

    function toggleInfoText(pIdx, cIdx) {
        const bubble = document.getElementById(`info-bubble-${pIdx}-${cIdx}`);
        bubble.style.display = (bubble.style.display === 'block') ? 'none' : 'block';
    }

    function togglePoster(idx) {
        const item = document.getElementById(`poster-item-${idx}`);
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.poster-item').forEach(el => el.classList.remove('active'));
        if (!isActive) {
            item.classList.add('active');
            const yOffset = -180; 
            const y = item.getBoundingClientRect().top + window.pageYOffset + yOffset;
            window.scrollTo({top: y, behavior: 'smooth'});
        }
    }

    function saveLocal(idx) {
        const name = document.getElementById('jurorName').value.trim();
        if(!name) { alert("Bitte Namen eingeben!"); return; }
        const selects = document.querySelectorAll(`.score-sel[data-p="${idx}"]`);
        let allFilled = true;
        selects.forEach(s => { if(s.value === "") allFilled = false; });
        if(!allFilled) { alert("Bitte alle 3 Kriterien bewerten!"); return; }
        document.getElementById(`poster-item-${idx}`).classList.add('done');
        document.getElementById(`poster-item-${idx}`).classList.remove('active');
        autoSave();
    }

    function autoSave() {
        const name = document.getElementById('jurorName').value.trim();
        const ratings = {};
        document.querySelectorAll('.poster-item.done').forEach(item => {
            const pIdx = item.id.replace('poster-item-', '');
            ratings[pIdx] = {};
            item.querySelectorAll('.score-sel').forEach(s => { ratings[pIdx][s.dataset.c] = parseInt(s.value); });
        });
        db.ref('results/' + jurorUID).set({ juror_name: name, ratings: ratings });
    }

    function finalCloudUpload() { autoSave(); alert("Daten synchronisiert!"); }
    
    function toggleAdmin() { 
        if(prompt("Passwort:") === "admin123") { 
            document.getElementById('adminArea').style.display = 'block'; 
            loadAdminTable(); 
        } 
    }

    function loadAdminTable() {
        db.ref('results').on('value', snap => {
            const results = snap.val();
            let stats = [];

            titles.forEach((t, i) => {
                let sum = 0, count = 0;
                for(let uid in results) {
                    if(results[uid].ratings && results[uid].ratings[i]) {
                        let pSum = 0;
                        for(let c=0; c<3; c++) pSum += results[uid].ratings[i][c];
                        sum += (pSum / 3);
                        count++;
                    }
                }
                stats.push({ title: t, avg: count > 0 ? (sum / count) : 0, votes: count });
            });

            stats.sort((a, b) => b.avg - a.avg || b.votes - a.votes);

            let html = '<table><tr><th>Rang</th><th>Poster</th><th>Ø (3 Krit.)</th><th>Votes</th></tr>';
            stats.forEach((s, index) => {
                const warningStyle = s.votes < 3 ? 'style="color: #e74c3c; font-weight:bold;"' : '';
                html += `<tr>
                    <td>${index + 1}</td>
                    <td style="text-align:left">${s.title}</td>
                    <td><b>${s.avg > 0 ? s.avg.toFixed(2) : '-'}</b></td>
                    <td ${warningStyle}>${s.votes}</td>
                </tr>`;
            });
            document.getElementById('adminTable').innerHTML = html + '</table><p><small>* Rote Votes = Weniger als 3 Bewertungen</small></p>';
        });
    }

    function exportToCSV() {
        db.ref('results').once('value', snap => {
            const results = snap.val();
            // Header mit Votes ergänzt
            let csv = "\ufeffJuror;Poster;Anzahl Votes (Poster);Mittelwert (3 Krit.)\n";
            
            // Erst die Statistiken pro Poster berechnen für die Spalte "Anzahl Votes"
            let posterVotes = {};
            titles.forEach((t, i) => {
                let count = 0;
                for(let uid in results) {
                    if(results[uid].ratings && results[uid].ratings[i]) count++;
                }
                posterVotes[i] = count;
            });

            for(let uid in results) {
                const r = results[uid].ratings;
                const juror = results[uid].juror_name;
                for(let pIdx in r) {
                    let sum = 0; 
                    for(let c=0; c<3; c++) sum += r[pIdx][c];
                    csv += `"${juror}";"${titles[pIdx]}";${posterVotes[pIdx]};${(sum/3).toFixed(2)}\n`;
                }
            }
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "DGfB2026_Ranking_Detail.csv";
            link.click();
        });
    }
</script>
</body>
</html>
