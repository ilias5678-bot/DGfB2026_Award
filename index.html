<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DGfB 2026 Jury Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #2ecc71; --text: #2c3e50; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); line-height: 1.4; }

        .sticky-top-area { position: sticky; top: 0; z-index: 1000; background: var(--bg); }
        .header { background: white; padding: 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .logo-container img { width: 100%; max-width: 500px; height: auto; display: block; margin: 0 auto; }
        .header-content { padding: 5px 15px 10px 15px; background: white; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #eee; font-size: 16px; text-align: center; background: #f9f9f9; }

        .ranking-legend { background: #ffffff; padding: 10px; font-size: 0.75rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-around; box-shadow: 0 4px 6px -2px rgba(0,0,0,0.1); }
        .score-box { padding: 2px 6px; border-radius: 4px; font-weight: bold; color: white; margin-right: 4px; }
        .bg-red { background: #e74c3c; }
        .bg-green { background: #2ecc71; }

        #mainContainer { padding: 15px; }
        .poster-item { background: white; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #ddd; }
        .poster-item.active { border-left-color: var(--accent); }
        .poster-item.done { border-left-color: var(--success); background: #fafffb; }

        .poster-header { padding: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 0.85rem; }
        .poster-title-area { display: flex; flex-direction: column; flex: 1; padding-right: 5px; }
        
        /* Autoren Button Style */
        .author-info-btn { 
            background: #eee; 
            color: #666; 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .author-info-btn:active { background: #ddd; }

        .poster-content { display: none; padding: 10px 14px; border-top: 1px solid #f0f0f0; }
        .poster-item.active .poster-content { display: block; }

        .crit-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; gap: 10px; }
        .crit-label-area { display: flex; align-items: center; flex: 1; font-size: 0.82rem; font-weight: 500; }
        .info-icon { display: inline-block; width: 18px; height: 18px; background: var(--accent); color: white; border-radius: 50%; text-align: center; line-height: 18px; font-size: 11px; margin-left: 8px; cursor: pointer; flex-shrink: 0; }
        
        .info-text-bubble { display: none; background: #ebf5fb; color: #2e86c1; padding: 8px; border-radius: 6px; font-size: 0.75rem; margin-bottom: 8px; border: 1px solid #d6eaf8; }
        .author-bubble { display: none; background: #f9f9f9; color: #666; padding: 10px; border-radius: 6px; font-size: 0.75rem; margin-top: 8px; border: 1px solid #eee; font-style: italic; line-height: 1.3; }

        select { padding: 6px; border-radius: 6px; background: #fff; border: 2px solid #ddd; font-size: 1rem; width: 65px; font-weight: bold; }
        .btn-save-local { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: 800; margin-top: 10px; }
        .btn-cloud { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; width: calc(100% - 30px); font-size: 1.1rem; font-weight: 800; margin: 10px 15px 40px 15px; text-transform: uppercase; cursor: pointer; }

        #adminArea { padding: 15px; background: white; margin: 15px; border-radius: 12px; display: none; }
        #adminTable table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        #adminTable th, #adminTable td { border: 1px solid #eee; padding: 8px; text-align: center; }
        #adminTable th { background: #f8f9fa; }
        .btn-csv { background: #e67e22; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sticky-top-area">
    <div class="header">
        <div class="logo-container"><img src="https://bio-mechanik.org/wp-content/uploads/2025/08/DGfB-banner-v8-1.png"></div>
    </div>
    <div class="header-content">
        <input type="text" id="jurorName" placeholder="Ihr Name (Juroren-Kürzel)">
    </div>
    <div class="ranking-legend">
        <div class="legend-item"><span class="score-box bg-red">1</span> schlecht</div>
        <div class="legend-item">...</div>
        <div class="legend-item"><span class="score-box bg-green">5</span> exzellent</div>
    </div>
</div>

<div id="mainContainer"></div>

<button class="btn-cloud" onclick="finalCloudUpload()">Zentral Speichern</button>
<button onclick="toggleAdmin()" style="width:100%; padding:20px; opacity:0.05; background:none; border:none;">Admin</button>

<div id="adminArea">
    <h3>Ranking Übersicht</h3>
    <button class="btn-csv" onclick="exportToCSV()">Als CSV exportieren</button>
    <div id="adminTable"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMk8sqJiTbOB1LKNZJ4peKEBoyz_2sohM",
        authDomain: "dgfb-2026.firebaseapp.com",
        databaseURL: "https://dgfb-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dgfb-2026",
        storageBucket: "dgfb-2026.firebasestorage.app",
        messagingSenderId: "195774055960",
        appId: "1:195774055960:web:b83f48b55f8ffd5266a56d",
        measurementId: "G-0CS3ZW0ZDV"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let jurorUID = localStorage.getItem('jurorUID') || ("J-" + Math.random().toString(36).substr(2, 5).toUpperCase());
    localStorage.setItem('jurorUID', jurorUID);

    const posterData = [
        { id: "109", title: "Biomechanische Testung von Kabelklammerimplantaten zur Stabilisierung des vorderen Beckenrings im Zweibeinstandversuch", authors: "Bremer; Simon; Heilig; Heilig; Al Refai; Hölscher-Doht; Meffert; Jordan" },
        { id: "111", title: "Exploring Optimal Body Positioning in MTB Gravity Sports Using IMU Data", authors: "Ronzon; Strutzenberger; Hollaus" },
        { id: "129", title: "Be Real: Predicting Treadmill Belt Speed Changes in Walking", authors: "Fleischmann; Eskofier; Koelewijn" },
        { id: "146", title: "Wie beeinflusst mechanische Belastung das Quellverhalten der Bandscheibe? Eine In-vitro-studie", authors: "Greiner-Perth; Unseld; Wilke; Liebsch" },
        { id: "154", title: "Pilotstudie: Analyse intra- und interindividueller Effekte von Plantar- und Kieferprovokationen auf spatio-temporale Gangparameter", authors: "Wigger; Becker; Kaya; Osterloh; Kietz; Soodmand; Knaack; Feldhege; Su; Perchthaler; Kebbach; Bader" },
        { id: "155", title: "Comparison of Gait Variations During Forward, Sideways, and Backward Movement Between Neurological Patient Groups and a Healthy Control Group", authors: "Knottnerus-Meyer; Wagner; Schümann; Romijnders; Litzenberger; Maetzler; Zelenka; Hansen" },
        { id: "158", title: "Osteosynthesis Screw Failure Predicted by Peri-implant Bone Morphology and Load Angle Using Machine-learning Models", authors: "Reisinger; Silva-Henao; Decet" },
        { id: "162", title: "Variability in Biomechanical Gait Parameters of a Person With a Transfemoral Amputation – Results of a Multicenter Study", authors: "Ernst; Pröbsting; Schopper; Schmalz; Bellmann" },
        { id: "168", title: "Integrating µCT-based Geometry Into Biomechanical Testing of Bone Properties in the Rat Model", authors: "Komrakova; Staub; Böker; Schilling; Lehmann; Sehmisch; Hoffmann" },
        { id: "170", title: "Evaluating Human Activity Recognition Algorithms for Weight-bearing Detection From Smart Insoles", authors: "Catalano; Kersting; Kalpen" },
        { id: "172", title: "Lockerungserkennung von Hüftendoprothesen-stielen mittels Körperschallmessungen an mehreren Implantat-positionen", authors: "Graumüller; Geiger; Spors; Bader; Kluess; Haubelt" },
        { id: "180", title: "Regional Spatial Activation Patterns of the Biceps Femoris Long Head Remain Consistent Across Joint Angles During Eccentric Knee Flexion", authors: "Fassbender; Karamanidis; Potthast" },
        { id: "185", title: "Gibt es seitenspezifische Unterschiede in der Belastbarkeit von Pedikelschrauben? Vergleich der Knochendichte mit biomechanischen Testungen", authors: "Metzner; Schleifenbaum; Schultze; Kurz; Heyde; Pieroh" },
        { id: "188", title: "Einfluss von Krafttraining der Oberschenkelmuskulatur auf die Kniegelenkskinematik und -kinetik beim Gehen: Eine Pilotstudie", authors: "Osterloh; Kietz; Knaack; Kebbach; Bader; Behrens" },
        { id: "200", title: "A Comparison of Methods to Investigate Vibration Perception Thresholds at the Foot", authors: "Zippenfennig; Kloß; Milani; Marin; Drechsel" },
        { id: "204", title: "In vivo Belastung induziert ortsspezifische, teilweise reversible Gewebeanpassung in kaudalen Wirbelkörpern", authors: "Erhard; Thiele; Bonell; Celik; Duda" },
        { id: "223", title: "Einfluss neuromuskulärer Stimulation auf thermografische Veränderungen der Rückenmuskulatur während langer Sitzphasen", authors: "Lieshoff; Sichting" },
        { id: "224", title: "Adhesion Enhancement of Titanium Nanotubes on Ti6Al4V: Scratch Test Evaluation", authors: "Buchholz; Voropai; Bertrand; Lohmann; Döring" },
        { id: "226", title: "Biomechanische Analyse der Band- und Sehnenstruktur des Kniegelenks", authors: "Fischer; Metzner; Wang; Zheng; Löffler; Theopold; Schleifenbaum" },
        { id: "227", title: "Development of an Advanced Knee Simulator for Dynamic Motion: A Feasibility Study", authors: "Prusa; Tomka; Haddara; Woiczinski; Grupp; Müller; Dan; Raniga; Ferreira; Appleyard" },
        { id: "229", title: "Single vs. Double Plating in Low Transverse Sacral Fractures – A Biomechanical Study", authors: "Rudek; Lindtner; Hörmann; Schmölz" },
        { id: "233", title: "Biomechanical Analysis and Hyperelastic Modelling of Porcine Growth Plates Under Compression", authors: "Hucke; Teixeira; Seitz; Gámez; Huß; Hammer; Wittek; Niestrawska" },
        { id: "238", title: "Überwachung der Knochenheilung mithilfe einer Sensorenplatte (Smart Implant) über einen Zeitraum von über 11 Jahren", authors: "Meissner; Münch; Barth; Weinrich; Schulz" },
        { id: "239", title: "Computational Framework for Mechanical Analysis of Highly Aligned Channel-like Collagen Scaffolds in Critical-size Bone Defects", authors: "Hinrichsen; Gutschmidt; Oppermann; Huber; Checa" },
        { id: "241", title: "Experimenteller Aufbau zur quasistatischen Prüfung von Sternumfrakturen mit osteosynthetischer Versorgung", authors: "Meissner; Münch; Preißing; Schulz-Drost; Schulz" },
        { id: "251", title: "Muscle Extension Analysis for Soft Wearable Systems Design", authors: "Sadretdinova; Siegmund; Schuh; Kyosev" },
        { id: "259", title: "Accuracy of a Simplified Method for Assessing Triceps Surae Muscle Volume in Patients After Fibula Free Flap Surgery: A MRI Case Series", authors: "Kelley; Kharazi; Bär; Kühn; Kämmerer; Weber; Karamanidis" },
        { id: "264", title: "Longitudinale Entwicklung verschiedener Gangparameter nach Sprunggelenksfraktur: Eine Follow-up-analyse von 3 bis 6 Monaten postoperativ", authors: "Oestreich; Rieken; Joseph; Zeckey" },
        { id: "270", title: "Developing an Electromechanical Computational Model of the Human Stomach", authors: "Henke; Brandstaeter; Gizzi; Aydin; Cyron" }
    ];

    const criteriaData = [
        { name: "Qualität & Innovation", info: "Originalität, methodische Strenge & Neuheitswert." },
        { name: "Struktur & Darstellung", info: "Visuelle Qualität, logischer Aufbau & Klarheit." },
        { name: "Relevanz & Transfer", info: "Bedeutung für Fachwelt, Klinik oder Praxis." }
    ];

    const container = document.getElementById('mainContainer');
    posterData.forEach((p, pIdx) => {
        let critHtml = '';
        criteriaData.forEach((c, cIdx) => {
            critHtml += `
            <div id="info-bubble-${pIdx}-${cIdx}" class="info-text-bubble">${c.info}</div>
            <div class="crit-row">
                <div class="crit-label-area">
                    <span>${c.name}</span>
                    <span class="info-icon" onclick="event.stopPropagation(); toggleInfoText(${pIdx}, ${cIdx})">i</span>
                </div>
                <select class="score-sel" data-p="${pIdx}" data-c="${cIdx}">
                    <option value="" disabled selected>-</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                </select>
            </div>`;
        });
        const item = document.createElement('div');
        item.className = 'poster-item';
        item.id = `poster-item-${pIdx}`;
        item.innerHTML = `
            <div class="poster-header" onclick="togglePoster(${pIdx})">
                <div class="poster-title-area">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;">
                        <span><strong>${p.id}</strong>: ${p.title}</span>
                        <span class="author-info-btn" onclick="event.stopPropagation(); toggleAuthor(${pIdx})">👤</span>
                    </div>
                    <div id="author-bubble-${pIdx}" class="author-bubble">${p.authors}</div>
                </div>
                <span class="status-dot"></span>
            </div>
            <div class="poster-content">${critHtml}<button class="btn-save-local" onclick="saveLocal(${pIdx})">Übernehmen</button></div>`;
        container.appendChild(item);
    });

    function toggleInfoText(pIdx, cIdx) {
        const bubble = document.getElementById(`info-bubble-${pIdx}-${cIdx}`);
        bubble.style.display = (bubble.style.display === 'block') ? 'none' : 'block';
    }

    function toggleAuthor(pIdx) {
        const bubble = document.getElementById(`author-bubble-${pIdx}`);
        bubble.style.display = (bubble.style.display === 'block') ? 'none' : 'block';
    }

    function togglePoster(idx) {
        const item = document.getElementById(`poster-item-${idx}`);
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.poster-item').forEach(el => el.classList.remove('active'));
        if (!isActive) {
            item.classList.add('active');
            const yOffset = -220; 
            const y = item.getBoundingClientRect().top + window.pageYOffset + yOffset;
            window.scrollTo({top: y, behavior: 'smooth'});
        }
    }

    function saveLocal(idx) {
        const name = document.getElementById('jurorName').value.trim();
        if(!name) { alert("Bitte Namen eingeben!"); return; }
        const selects = document.querySelectorAll(`.score-sel[data-p="${idx}"]`);
        let allFilled = true;
        selects.forEach(s => { if(s.value === "") allFilled = false; });
        if(!allFilled) { alert("Bitte alle 3 Kriterien bewerten!"); return; }
        document.getElementById(`poster-item-${idx}`).classList.add('done');
        document.getElementById(`poster-item-${idx}`).classList.remove('active');
        autoSave();
    }

    function autoSave() {
        const name = document.getElementById('jurorName').value.trim();
        const ratings = {};
        document.querySelectorAll('.poster-item.done').forEach(item => {
            const pIdx = item.id.replace('poster-item-', '');
            ratings[pIdx] = {};
            item.querySelectorAll('.score-sel').forEach(s => { ratings[pIdx][s.dataset.c] = parseInt(s.value); });
        });
        db.ref('results/' + jurorUID).set({ juror_name: name, ratings: ratings });
    }

    function finalCloudUpload() { autoSave(); alert("Daten synchronisiert!"); }
    function toggleAdmin() { if(prompt("Passwort:") === "admin123") { document.getElementById('adminArea').style.display = 'block'; loadAdminTable(); } }

    function loadAdminTable() {
        db.ref('results').on('value', snap => {
            const results = snap.val();
            let stats = [];
            posterData.forEach((p, i) => {
                let sum = 0, count = 0;
                for(let uid in results) {
                    if(results[uid].ratings && results[uid].ratings[i]) {
                        let pSum = 0; for(let c=0; c<3; c++) pSum += results[uid].ratings[i][c];
                        sum += (pSum / 3); count++;
                    }
                }
                stats.push({ id: p.id, title: p.title, avg: count > 0 ? (sum / count) : 0, votes: count });
            });
            stats.sort((a, b) => b.avg - a.avg || b.votes - a.votes);
            let html = '<table><tr><th>ID</th><th>Poster</th><th>Ø</th><th>Votes</th></tr>';
            stats.forEach((s) => {
                const warning = s.votes < 3 ? 'style="color:#e74c3c;font-weight:bold;"' : '';
                html += `<tr><td>${s.id}</td><td style="text-align:left">${s.title}</td><td><b>${s.avg > 0 ? s.avg.toFixed(2) : '-'}</b></td><td ${warning}>${s.votes}</td></tr>`;
            });
            document.getElementById('adminTable').innerHTML = html + '</table>';
        });
    }

    function exportToCSV() {
        db.ref('results').once('value', snap => {
            const results = snap.val();
            let csv = "\ufeffJuror;Poster-ID;Titel;Votes (Poster);Mittelwert\n";
            let pVotes = {};
            posterData.forEach((p, i) => {
                let count = 0; for(let uid in results) { if(results[uid].ratings && results[uid].ratings[i]) count++; }
                pVotes[i] = count;
            });
            for(let uid in results) {
                const r = results[uid].ratings;
                for(let pIdx in r) {
                    let sum = 0; for(let c=0; c<3; c++) sum += r[pIdx][c];
                    csv += `"${results[uid].juror_name}";"${posterData[pIdx].id}";"${posterData[pIdx].title}";${pVotes[pIdx]};${(sum/3).toFixed(2)}\n`;
                }
            }
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = "DGfB2026_Final_Ranking.csv"; link.click();
        });
    }
</script>
</body>
</html>
